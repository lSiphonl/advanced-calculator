<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Advanced Calculator</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="calcLogic.js" defer></script>
  </head>

  <body>
    <section id="calc-body">
      <section id="display-screen">0</section>
      <section class="button-container">
        <button class="clear" value="clearAll">AC</button>
        <button class="clear" value="clearEntry">CE</button>
        <button class="percentage-button" value="%">%</button>
        <button class="operator">/</button>
        <button class="btn-number">8</button>
        <button class="btn-number">9</button>
        <button class="btn-number">7</button>
        <button class="operator">*</button>
        <button class="btn-number">4</button>
        <button class="btn-number">5</button>
        <button class="btn-number">6</button>
        <button class="operator">-</button>
        <button class="btn-number">1</button>
        <button class="btn-number">2</button>
        <button class="btn-number">3</button>
        <button class="operator">+</button>
        <button class="sign-button" value="sign">+/-</button>
        <button class="btn-number-zero">0</button>
        <button class="btn-decimal">.</button>
        <button class="operator">=</button>
    </section>
  </body>
</html>
