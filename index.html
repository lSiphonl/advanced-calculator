<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Advanced Calculator</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="calcLogic.js" defer></script>
  </head>

  <body>
    <section id="calc-body">
      <section id="display-screen">0</section>

      <section id="calc-buttons">
        <section id="top-buttons">
          <button class="btn-ac" value="clearAll">AC</button>
          <button class="btn-backspace" value="clearEntry">CE</button>
          <button class="btn-percent" value="%">%</button>
          <button class="btn-op" value="/">/</button>
        </section>

        <section id="main-buttons">
          <section id="numbers">
            <button class="btn-num" value="7">7</button>
            <button class="btn-num" value="8">8</button>
            <button class="btn-num" value="9">9</button>
            <button class="btn-num" value="4">4</button>
            <button class="btn-num" value="5">5</button>
            <button class="btn-num" value="6">6</button>
            <button class="btn-num" value="1">1</button>
            <button class="btn-num" value="2">2</button>
            <button class="btn-num" value="3">3</button>
            <button class="btn-sign" value="sign">+/-</button>
            <button class="btn-num" value="0">0</button>
            <button class="btn-decimal" value=".">.</button>
          </section>

          <section id="operators">
            <button class="btn-op" value="*">*</button>
            <button class="btn-op" value="-">-</button>
            <button class="btn-op" value="+">+</button>
            <button class="btn-equals" value="=">=</button>
          </section>
        </section>
      </section>
    </section>
    <aside id="keyboard-shortcuts">
      <h2>
        Keyboard
        <br />
        Shortcuts
      </h2>

      <ul>
        <li><kbd>0-9</kbd> Number input</li>
        <li><kbd>+</kbd> Addition</li>
        <li><kbd>-</kbd> Subtraction</li>
        <li><kbd>*</kbd> Multiplication</li>
        <li><kbd>/</kbd> Division</li>
        <li><kbd>.</kbd> Decimal</li>
        <li><kbd>%</kbd> Percentage</li>
        <li><kbd>Enter</kbd> Equals</li>
        <li><kbd>Backspace</kbd> Clear Entry</li>
        <li><kbd>Esc</kbd> Clear All</li>
      </ul>
    </aside>
  </body>
</html>
